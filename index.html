<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRAINHOSTEL — Consulta el Convenio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1a1a1a;
      color: #fff;
      padding: 16px 24px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    header span {
      color: #f0a500;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 720px;
      padding: 14px 18px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .msg.user {
      background: #1a1a1a;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg.bot {
      background: #fff;
      color: #1a1a1a;
      align-self: flex-start;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .msg.bot.loading {
      color: #999;
      font-style: italic;
    }

    #form {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      background: #fff;
      border-top: 1px solid #e0e0e0;
    }

    #input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }

    #input:focus { border-color: #1a1a1a; }

    button {
      padding: 12px 20px;
      background: #f0a500;
      color: #1a1a1a;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #d4920a; }
    button:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>BRAINHOSTEL — <span>Convenio Hostelería Bizkaia 2025</span></header>

  <div id="chat">
    <div class="msg bot">¡Hola! Soy tu asistente del Convenio Colectivo de Hostelería de Bizkaia 2025. Pregúntame sobre salarios, jornada, vacaciones, bajas, contratos o cualquier duda laboral. 👋</div>
  </div>

  <form id="form">
    <input id="input" type="text" placeholder="Escribe tu pregunta..." autocomplete="off" />
    <button type="submit" id="btn">Enviar</button>
  </form>

  <script>
    const API = "https://dependable-amazement-production-7413.up.railway.app/ask";
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const btn = document.getElementById("btn");

    function addMsg(text, type) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (!q) return;

      input.value = "";
      btn.disabled = true;
      addMsg(q, "user");
      const loading = addMsg("Consultando el convenio...", "bot loading");

      try {
        const res = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q }),
        });
        const data = await res.json();
        loading.className = "msg bot";
        loading.textContent = data.answer || data.detail || "Sin respuesta.";
      } catch (err) {
        loading.className = "msg bot";
        loading.textContent = "Error de conexión. Inténtalo de nuevo.";
      } finally {
        btn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
